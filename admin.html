<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ辞書管理 - Anki Meister</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/admin.css">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-top">
                <h1>⭐ マイ辞書エディタ</h1>
                <a href="index.html" class="btn-exit-admin">
                    <span class="exit-icon">✕</span>
                    <span class="exit-text">学習に戻る</span>
                </a>
            </div>
        </header>

        <div class="admin-card">
            <h3 id="form-title">新規単語を追加</h3>
            <input type="hidden" id="edit-id">
            <div class="input-stack">
                <div class="input-group">
                    <label>単語 (ドイツ語)</label>
                    <input type="text" id="input-word" placeholder="例: das Haus">
                </div>
                <div class="input-group">
                    <label>カテゴリー</label>
                    <input type="text" id="input-category" placeholder="例: 名詞">
                </div>
                <div class="input-group">
                    <label>日本語訳</label>
                    <input type="text" id="input-translation" placeholder="例: 家">
                </div>
                <div class="input-group">
                    <label>例文</label>
                    <textarea id="input-example" placeholder="例文を入力"></textarea>
                </div>
                <div class="input-group">
                    <label>例文の訳</label>
                    <textarea id="input-example-translation" placeholder="例文の日本語訳を入力"></textarea>
                </div>
            </div>
            <div class="btn-row">
                <button id="btn-save" class="btn btn--primary">保存する</button>
                <button id="btn-cancel" class="btn btn--secondary hidden">キャンセル</button>
            </div>
        </div>

        <div class="admin-controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="登録した単語を検索...">
            </div>
        </div>

        <table class="vocab-table">
            <thead>
                <tr>
                    <th>単語 / 意味</th>
                    <th style="width: 100px; text-align:right;">操作</th>
                </tr>
            </thead>
            <tbody id="vocab-list-body">
            </tbody>
        </table>

        <div class="pagination">
            <button id="prev-page">← 前へ</button>
            <span id="page-info">1 / 1</span>
            <button id="next-page">次へ →</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./scripts/config.js"></script>
    <script src="./scripts/database.js"></script>
    <script src="./scripts/admin.js"></script>
</body>

</html>
