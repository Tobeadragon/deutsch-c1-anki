<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Anki Meister</title>
    <link rel="stylesheet" href="./styles/style.css">
    <style>
        /* 既存のstyle.cssの干渉をリセット */
        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px;
            writing-mode: horizontal-tb; /* 縦書きを強制リセット */
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 10px;
            color: var(--primary);
        }

        .login-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px; /* iPhoneでズームされないサイズ */
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .login-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary, #007aff);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-passkey {
            width: 100%;
            padding: 14px;
            background: #000;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .divider {
            margin: 20px 0;
            color: #ccc;
            font-size: 0.8rem;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h1 style="color: var(--primary); margin-bottom: 20px;">Anki Meister</h1>
        
        <div class="login-card">
            <h2>Willkommen</h2>
            <p>ログインしてデータを同期しましょう</p>
            
            <button id="passkey-btn" class="btn-passkey">
                <span>🔑</span> パスキーでログイン
            </button>

            <div class="divider">またはメールアドレス</div>

            <div class="input-group">
                <input type="email" id="email" class="login-input" placeholder="E-Mail Addresse">
            </div>
            
            <button id="magic-link-btn" class="btn-primary">
                ログインリンクを送信
            </button>
            
            <p id="msg" style="margin-top: 20px; color: var(--primary); font-weight: bold;"></p>
        </div>
    </div>

    <script type="module">
        import { SUPABASE_URL, SUPABASE_KEY } from './config.js';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('magic-link-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Emailを入力してください");
            
            const { error } = await supabase.auth.signInWithOtp({
                email,
                options: { emailRedirectTo: window.location.origin + '/index.html' }
            });
            if (error) alert(error.message);
            else document.getElementById('msg').innerText = "📩 メールを送信しました。";
        };

        document.getElementById('passkey-btn').onclick = async () => {
            const { error } = await supabase.auth.signInWithPasskey();
            if (error) alert("パスキーが登録されていません。まずはメールでログインしてください。");
            else window.location.href = 'index.html';
        };
    </script>
</body>
</html>
